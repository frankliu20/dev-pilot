# Dev Pilot Configuration — Azure Java Migration Copilot
# Default configuration for the modernize-java project.

# Workspace directory
workspace: ~/claude/workdir

# GitHub repos
repos:
  - devdiv-azure-service-dmitryr/azure-java-migration-copilot-vscode-extension
  - devdiv-microsoft/appmod-intellij

# Skill packs to activate
skills:
  - modernize-java

# AI platform
ai_platform: claude-code

# Chat language
chat_language: Chinese (Mandarin)

# Default modes
defaults:
  dev_issue_mode: normal
  review_pr_mode: auto
  fix_comment_mode: auto
  review_min_severity: medium

# Build & test commands
build:
  command: npm run build
  test_command: npx jest --testPathPattern={{file}} --no-coverage
  test_all_command: npm run test
  lint_command: npm run lint
  default_branch: main
